<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Code Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #58a6ff;
            --accent: #238636;
            --border: #30363d;
            --text: #c9d1d9;
            --terminal-text: #39ff14;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        nav { background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease-in; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Admin UI */
        .admin-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 25px; }
        input[type="text"] { width: 100%; padding: 12px; background: #010409; border: 1px solid var(--border); color: var(--primary); border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        textarea { width: 100%; height: 250px; background: #010409; color: #79c0ff; border: 1px solid var(--border); border-radius: 6px; padding: 15px; font-family: 'Courier New', monospace; box-sizing: border-box; resize: vertical; }
        .run-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        .terminal { background: black; color: var(--terminal-text); padding: 15px; border-radius: 6px; margin-top: 20px; font-family: monospace; font-size: 14px; border-left: 4px solid var(--accent); min-height: 60px; }

        /* User UI - Code Box */
        .code-card { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 25px; overflow: hidden; }
        .code-header { background: #161b22; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .copy-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .copy-btn:hover { background: #30363d; }
        pre { margin: 0; padding: 20px; overflow-x: auto; color: #e6edf3; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="showTab('admin')">Admin Panel</button>
    <button class="tab-btn" onclick="showTab('user')">User View</button>
</nav>

<div class="container">
    
    <div id="admin" class="section active">
        <div class="admin-panel">
            <h2 style="margin-top:0">Upload New Code</h2>
            <input type="text" id="titleInput" placeholder="কোডের নাম (Title)...">
            <textarea id="codeInput" placeholder="// এখানে আপনার কোডিং পেস্ট করুন..."></textarea>
            <button class="run-btn" onclick="processUpload()">RUN & UPLOAD</button>
            <div id="terminal" class="terminal">> System ready. Waiting for input...</div>
        </div>
    </div>

    <div id="user" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Cloud Snippets</h2>
            <button onclick="fetchData()" style="background:transparent; color:var(--primary); border:1px solid var(--primary); padding:5px 15px; border-radius:4px; cursor:pointer;">Refresh</button>
        </div>
        <div id="codeDisplayArea">
            <p style="text-align:center; color: #8b949e;">কোড লোড হচ্ছে...</p>
        </div>
    </div>

</div>

<script>
    // Supabase Configuration
    const SB_URL = "https://soduyfwldglavqfbvbod.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZHV5ZndsZGdsYXZxZmJ2Ym9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzExNjQsImV4cCI6MjA5MTMwNzE2NH0.-5zO6e8J3KUPg4nulXaH_XPH1pyckdCAkb2VgfXusn0";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // Tab Logic
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'user') fetchData();
    }

    // Terminal Logic & Upload
    async function processUpload() {
        const title = document.getElementById('titleInput').value;
        const code = document.getElementById('codeInput').value;
        const terminal = document.getElementById('terminal');

        if (!title || !code) {
            terminal.innerHTML = "<span style='color:red'>> Error: টাইটেল এবং কোড দুটোই প্রয়োজন!</span>";
            return;
        }

        terminal.innerHTML = "> Connecting to server...";
        
        setTimeout(async () => {
            terminal.innerHTML += "<br>> Processing code blocks...";
            
            const { error } = await _supabase
                .from('all_codes')
                .insert([{ title: title, code_content: code }]);

            if (error) {
                terminal.innerHTML += `<br><span style='color:red'>> Failed: ${error.message}</span>`;
            } else {
                terminal.innerHTML += "<br>> Uploading to Supabase Cloud...";
                setTimeout(() => {
                    terminal.innerHTML += "<br>> <span style='color:#39ff14'>SUCCESSFULLY CODE UPLOADED!</span>";
                    document.getElementById('titleInput').value = "";
                    document.getElementById('codeInput').value = "";
                }, 800);
            }
        }, 1000);
    }

    // Fetch and Display Logic
    async function fetchData() {
        const area = document.getElementById('codeDisplayArea');
        area.innerHTML = "Fetching data from cloud...";

        const { data, error } = await _supabase
            .from('all_codes')
            .select('*')
            .order('id', { ascending: false });

        if (error || !data) {
            area.innerHTML = "No data found.";
            return;
        }

        area.innerHTML = "";
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'code-card';
            card.innerHTML = `
                <div class="code-header">
                    <strong>${item.title}</strong>
                    <button class="copy-btn" onclick="copyCode(this, 'code-${index}')">Copy Code</button>
                </div>
                <pre><code id="code-${index}">${escapeHTML(item.code_content)}</code></pre>
            `;
            area.appendChild(card);
        });
    }

    // Copy Function
    function copyCode(btn, id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Code", 2000);
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[m]));
    }
</script>

</body>
</html>
