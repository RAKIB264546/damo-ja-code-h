<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Code Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #58a6ff;
            --accent: #238636;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: var(--card);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: #21262d;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            width: 95%;
        }

        .section { display: none; }
        .section.active { display: block; }

        /* Admin UI */
        .admin-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #010409;
            color: #79c0ff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            resize: vertical;
        }

        .run-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            width: 100%;
        }

        .terminal {
            background: black;
            color: #39ff14;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            border-left: 3px solid var(--accent);
            min-height: 50px;
        }

        /* User UI - Code Block Style */
        .code-snippet-box {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 25px;
            position: relative;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: #8b949e;
        }

        .copy-btn {
            background: #21262d;
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover { background: #30363d; }

        pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
            color: #e6edf3;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="showTab('admin')">Admin Panel</button>
    <button class="tab-btn" onclick="showTab('user')">User View</button>
</nav>

<div class="container">
    
    <div id="admin" class="section active">
        <div class="admin-box">
            <h3 style="margin-top:0">Upload Code to Cloud</h3>
            <textarea id="codeInput" placeholder="// এখানে আপনার কোড পেস্ট করুন..."></textarea>
            <button class="run-btn" onclick="uploadProcess()">Run & Upload</button>
            
            <div id="terminal" class="terminal">> System idle...</div>
        </div>
    </div>

    <div id="user" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0">Available Codes</h3>
            <button onclick="fetchCodes()" style="background:none; border:1px solid var(--primary); color:var(--primary); cursor:pointer; padding:5px 10px; border-radius:4px;">Refresh</button>
        </div>
        <div id="codeListArea">
            <p style="color: #8b949e;">কোড লোড হচ্ছে...</p>
        </div>
    </div>

</div>

<script>
    // Supabase Setup
    const SUPABASE_URL = "https://clrwzlcxjfsnruakwlev.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNscnd6bGN4amZzbnJ1YWt3bGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mzg3MjYsImV4cCI6MjA5MTExNDcyNn0.5qTNtLyT3LM3UE7_hrtj-bjXBiRqksVrmmB0NZrwo48";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Tab Logic
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'user') fetchCodes();
    }

    // Admin Upload Process
    async function uploadProcess() {
        const code = document.getElementById('codeInput').value;
        const term = document.getElementById('terminal');

        if(!code.trim()) {
            term.innerHTML = "<span style='color:red'>> Error: কোড বক্স খালি!</span>";
            return;
        }

        // Terminal Animation
        term.innerHTML = "> Initializing connection...";
        
        setTimeout(async () => {
            term.innerHTML += "<br>> Authenticating with Supabase...";
            
            // আপনার বটের 'users' টেবিল ব্যবহার করে ডেটা ইনসার্ট করা হচ্ছে।
            // দ্রষ্টব্য: এখানে আমরা 'user_id' হিসেবে একটা র‍্যান্ডম আইডি দিচ্ছি 
            // এবং 'balance' কলামে কোড সেভ করছি (যেহেতু আপনি নতুন টেবিল করবেন না)।
            const { error } = await _supabase
                .from('users') 
                .insert([{ user_id: Date.now(), balance: 0, total_numbers: 0, referral_count: 0, total_ref_earnings: 0, content: code }]); 
                // নোট: আপনার টেবিলে 'content' নামে একটি কলাম থাকলে সেটি ইউজ হবে। 
                // যদি কলাম না থাকে তবে আপনাকে Supabase এ গিয়ে Table Editor থেকে একটি 'content' কলাম (Text Type) যোগ করতে হবে।

            setTimeout(() => {
                if(error) {
                    term.innerHTML += `<br><span style='color:red'>> Upload Failed: ${error.message}</span>`;
                } else {
                    term.innerHTML += "<br>> Syncing with server...";
                    setTimeout(() => {
                        term.innerHTML += "<br>> <span style='color:#39ff14'>SUCCESSFULLY CODE UPLOADED!</span>";
                        document.getElementById('codeInput').value = "";
                    }, 800);
                }
            }, 1000);
        }, 800);
    }

    // User Fetch Logic
    async function fetchCodes() {
        const listArea = document.getElementById('codeListArea');
        listArea.innerHTML = "Fetching snippets...";

        const { data, error } = await _supabase
            .from('users')
            .select('*')
            .not('content', 'is', null) // শুধুমাত্র যাদের কন্টেন্ট আছে তাদের দেখাবে
            .order('id', { ascending: false });

        if(error || !data) {
            listArea.innerHTML = "No codes found or Table error.";
            return;
        }

        listArea.innerHTML = "";
        data.forEach((item, index) => {
            const box = document.createElement('div');
            box.className = 'code-snippet-box';
            box.innerHTML = `
                <div class="code-header">
                    <span>Snippet #${item.id}</span>
                    <button class="copy-btn" onclick="copyCode(this, 'code-${index}')">Copy</button>
                </div>
                <pre><code id="code-${index}">${escapeHTML(item.content)}</code></pre>
            `;
            listArea.appendChild(box);
        });
    }

    // Copy Function
    function copyCode(btn, id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.color = "#39ff14";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "#c9d1d9";
            }, 2000);
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[m]));
    }
</script>

</body>
</html>
