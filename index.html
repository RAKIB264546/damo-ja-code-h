<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud File Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #58a6ff; --accent: #238636; --border: #30363d; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; }
        .tab-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .section { display: none; background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid var(--border); }
        .section.active { display: block; }
        
        input[type="file"] { width: 100%; padding: 10px; background: #010409; border: 1px dashed var(--border); border-radius: 6px; margin-bottom: 15px; }
        .run-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .terminal { background: black; color: #39ff14; padding: 15px; border-radius: 6px; margin-top: 20px; font-family: monospace; min-height: 40px; border-left: 4px solid var(--accent); }

        .file-item { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
        .download-btn { background: var(--primary); color: white; text-decoration: none; padding: 5px 15px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="showTab('admin')">Admin (Upload)</button>
    <button class="tab-btn" onclick="showTab('user')">User (Files)</button>
</nav>

<div class="container">
    <div id="admin" class="section active">
        <h2>Upload File to Cloud</h2>
        <input type="file" id="fileSelector">
        <button class="run-btn" onclick="uploadFile()">RUN UPLOAD SYSTEM</button>
        <div id="terminal" class="terminal">> Waiting for file...</div>
    </div>

    <div id="user" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Available Files</h2>
            <button onclick="loadFiles()" style="background:none; color:var(--primary); border:1px solid var(--primary); padding:5px; cursor:pointer;">Refresh</button>
        </div>
        <div id="fileDisplayArea"></div>
    </div>
</div>

<script>
    const SB_URL = "https://soduyfwldglavqfbvbod.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZHV5ZndsZGdsYXZxZmJ2Ym9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzExNjQsImV4cCI6MjA5MTMwNzE2NH0.-5zO6e8J3KUPg4nulXaH_XPH1pyckdCAkb2VgfXusn0";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'user') loadFiles();
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileSelector');
        const terminal = document.getElementById('terminal');
        const file = fileInput.files[0];

        if (!file) {
            terminal.innerHTML = "<span style='color:red'>> Error: কোনো ফাইল সিলেক্ট করা হয়নি!</span>";
            return;
        }

        terminal.innerHTML = "> Connection established...";
        const fileName = `${Date.now()}_${file.name}`;

        // 1. Upload to Storage
        terminal.innerHTML += `<br>> Uploading ${file.name} to storage...`;
        const { data: uploadData, error: uploadError } = await _supabase.storage
            .from('files')
            .upload(fileName, file);

        if (uploadError) {
            terminal.innerHTML += `<br><span style='color:red'>> Storage Error: ${uploadError.message}</span>`;
            return;
        }

        // 2. Get Public URL
        const { data: urlData } = _supabase.storage.from('files').getPublicUrl(fileName);
        const publicUrl = urlData.publicUrl;

        // 3. Save to Database
        terminal.innerHTML += "<br>> Syncing file info with database...";
        const { error: dbError } = await _supabase
            .from('uploaded_files')
            .insert([{ file_name: file.name, file_url: publicUrl }]);

        if (dbError) {
            terminal.innerHTML += `<br><span style='color:red'>> DB Error: ${dbError.message}</span>`;
        } else {
            terminal.innerHTML += "<br>> <span style='color:#39ff14'>FILE SUCCESSFULLY UPLOADED!</span>";
            fileInput.value = "";
        }
    }

    async function loadFiles() {
        const area = document.getElementById('fileDisplayArea');
        area.innerHTML = "Loading files...";

        const { data, error } = await _supabase.from('uploaded_files').select('*').order('id', { ascending: false });

        if (error || !data) {
            area.innerHTML = "No files found.";
            return;
        }

        area.innerHTML = "";
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <span>${item.file_name}</span>
                <a href="${item.file_url}" target="_blank" class="download-btn">Download</a>
            `;
            area.appendChild(div);
        });
    }
</script>

</body>
</html>
