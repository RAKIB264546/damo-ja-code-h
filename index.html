<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Panel - Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --text-gray: #8b949e;
            --terminal-bg: #010409;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #c9d1d9;
            margin: 0;
            padding: 0;
        }

        /* Navbar & Tabs */
        nav {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: var(--text-gray);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Admin UI - Terminal Style */
        .admin-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #30363d;
            overflow: hidden;
        }

        .card-header {
            background: #21262d;
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }

        .form-group { padding: 20px; }
        
        input, textarea {
            width: 100%;
            background: var(--terminal-bg);
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
        }

        .run-btn {
            background: var(--accent);
            color: #0b0e14;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-box {
            background: black;
            color: #00ff00;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            border-top: 1px solid #30363d;
            min-height: 80px;
        }

        /* User UI - Card Style */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
        }

        .user-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .user-id { color: var(--primary); font-size: 0.8rem; margin-bottom: 10px; }
        .balance-tag { font-size: 1.5rem; font-weight: bold; color: white; margin: 10px 0; }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .copy-btn:active { background: var(--primary); }

    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="showTab('admin')">Admin Panel</button>
    <button class="tab-btn" onclick="showTab('user')" id="btn-fetch">User List & Balance</button>
</nav>

<div class="container">
    
    <div id="admin" class="section active">
        <div class="admin-card">
            <div class="card-header"><div class="status-dot"></div> System Controller</div>
            <div class="form-group">
                <label>Target User ID (Telegram UID)</label>
                <input type="text" id="targetUid" placeholder="e.g. 12345678">
                
                <label>Add/Subtract Balance (BDT)</label>
                <input type="number" id="balanceAmount" placeholder="e.g. 50.00">
                
                <button class="run-btn" onclick="updateBalance()">Execute Upload</button>
            </div>
            <div class="terminal-box" id="terminal">
                > Initializing system...<br>
                > Database: Supabase Connected.<br>
                > Ready for commands.
            </div>
        </div>
    </div>

    <div id="user" class="section">
        <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="margin:0">Active Users Data</h2>
            <button onclick="fetchUsers()" style="background:none; border: 1px solid var(--primary); color: var(--primary); cursor:pointer; border-radius:5px; padding: 5px 15px;">Refresh</button>
        </div>
        <div class="user-grid" id="userDisplay">
            </div>
    </div>

</div>

<script>
    // Supabase Configuration from your Bot
    const SUPABASE_URL = "https://clrwzlcxjfsnruakwlev.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNscnd6bGN4amZzbnJ1YWt3bGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mzg3MjYsImV4cCI6MjA5MTExNDcyNn0.5qTNtLyT3LM3UE7_hrtj-bjXBiRqksVrmmB0NZrwo48";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Tab Logic
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'user') fetchUsers();
    }

    // Terminal Logger
    function log(msg, type = "success") {
        const term = document.getElementById('terminal');
        const color = type === "error" ? "#ff4444" : "#00ff00";
        term.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        term.scrollTop = term.scrollHeight;
    }

    // Admin Function: Update User Balance in 'users' table
    async function updateBalance() {
        const uid = document.getElementById('targetUid').value;
        const amount = parseFloat(document.getElementById('balanceAmount').value);
        
        if(!uid || isNaN(amount)) {
            log("Error: Invalid ID or Amount", "error");
            return;
        }

        log(`Fetching user ${uid}...`);
        
        // First get current balance
        const { data: user, error: fetchError } = await _supabase
            .from('users')
            .select('balance')
            .eq('user_id', uid)
            .single();

        if (fetchError) {
            log("Error: User not found in database", "error");
            return;
        }

        const newBal = (parseFloat(user.balance) + amount).toFixed(2);
        
        log(`Updating balance to ${newBal} BDT...`);

        const { error: updateError } = await _supabase
            .from('users')
            .update({ balance: newBal })
            .eq('user_id', uid);

        if (updateError) {
            log("Error: Update failed", "error");
        } else {
            log(`Success: Successfully Code Uploaded and Balance Updated!`, "success");
            document.getElementById('targetUid').value = "";
            document.getElementById('balanceAmount').value = "";
        }
    }

    // User Function: Fetch all users from 'users' table
    async function fetchUsers() {
        const display = document.getElementById('userDisplay');
        display.innerHTML = "<p>Loading data from cloud...</p>";

        const { data, error } = await _supabase
            .from('users')
            .select('*');

        if (error) {
            display.innerHTML = "<p>Error fetching data.</p>";
            return;
        }

        display.innerHTML = "";
        data.forEach(u => {
            const card = document.createElement('div');
            card.className = 'user-card';
            card.innerHTML = `
                <div class="user-id">UID: ${u.user_id}</div>
                <button class="copy-btn" onclick="copyId('${u.user_id}', this)">Copy ID</button>
                <div class="balance-tag">${u.balance} <small>BDT</small></div>
                <div style="font-size:0.8rem; color:var(--text-gray)">
                    Numbers: ${u.total_numbers || 0} | Refs: ${u.referral_count || 0}
                </div>
            `;
            display.appendChild(card);
        });
    }

    function copyId(id, btn) {
        navigator.clipboard.writeText(id).then(() => {
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy ID", 2000);
        });
    }
</script>

</body>
</html>
